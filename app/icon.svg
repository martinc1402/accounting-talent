<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="AccountingTalent.in">
  <!--
    A favicon has no parent to inherit from, so unlike components/ui/LogoMark.tsx
    this one hard-codes the navy token (#131f5b) rather than using currentColor.
    The dark-scheme rule flips it to white: navy on a dark browser chrome is
    close to invisible.
  -->
  <style>
    .mark { stroke: #131f5b; }
    @media (prefers-color-scheme: dark) {
      .mark { stroke: #ffffff; }
    }
  </style>
  <g class="mark" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M12.5 52 C 17.8 37, 23 23, 28.6 13.2 C 29.6 12.35, 30.8 11.9, 32 11.9 C 33.2 11.9, 34.4 12.35, 35.4 13.2 C 41 23, 46.2 37, 51.5 52"/>
    <path d="M27.5 35 L36.5 35"/>
    <path d="M27.5 44.5 L36.5 44.5"/>
  </g>
</svg>
